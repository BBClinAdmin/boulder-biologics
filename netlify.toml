# Netlify configuration — Boulder Biologics marketing site
# Static site, no build step. Files are served from the repo root.

[build]
  publish = "."

# Pretty/clean URLs: serve /cellular-therapy from cellular-therapy.html and
# 301 the .html form to the clean URL.
[build.processing.html]
  pretty_urls = true

# ── Canonical host: force apex (boulderbiologics.com), redirect www → apex ──
[[redirects]]
  from = "https://www.boulderbiologics.com/*"
  to = "https://boulderbiologics.com/:splat"
  status = 301
  force = true

# ─────────────────────────────────────────────────────────────────────────
# 301s from the OLD live site's URLs (www.boulderbiologics.com sitemap, 45
# URLs) to the redesigned slugs, to preserve SEO equity / backlinks.
# Slugs unchanged between old and new (no redirect needed, they just resolve):
#   /prp  /prolotherapy  /contact  /our-clinic  /mesenchymal-stem-cells-mscs
# ─────────────────────────────────────────────────────────────────────────

# ── EPAT page removed 2026-06-23. /epat carried SEO equity from the old site,
#    so 301 it to the closest active offering (tendon & ligament injuries). ──
[[redirects]]

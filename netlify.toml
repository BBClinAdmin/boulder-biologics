# Netlify configuration — Boulder Biologics marketing site
# Static site, no build step. Files are served from the repo root.

[build]
  publish = "."

# Pretty/clean URLs: serve /cellular-therapy from cellular-therapy.html and
# 301 the .html form to the clean URL.
[build.processing.html]
  pretty_urls = true

# ── Canonical host: force apex (boulderbiologics.com), redirect www → apex ──
[[redirects]]
  from = "https://www.boulderbiologics.com/*"
  to = "https://boulderbiologics.com/:splat"
  status = 301
  force = true

